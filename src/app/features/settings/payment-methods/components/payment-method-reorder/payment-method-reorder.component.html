<div class="flex flex-col gap-4">
  <p class="text-sm text-slate-500">
    Arrastra las preguntas para cambiar el orden de aparición.
  </p>

  <p-orderlist
    [value]="items()"
    (onReorder)="onReorder($event)"
    [(selection)]="selectedItems"
    [dragdrop]="true"
    dataKey="id"
    filterBy="name"
    [listStyle]="{ 'max-height': '400px' }"
  >
    <ng-template #item let-paymentMethod>
      <div class="flex items-center gap-3 py-1 px-1 w-full">
        <span class="text-sm font-medium text-slate-800 truncate flex-1">
          {{ paymentMethod.name }}
        </span>

        <p-tag
          [value]="paymentMethod.isActive ? 'Activo' : 'Inactivo'"
          [severity]="paymentMethod.isActive ? 'success' : 'danger'"
          class="shrink-0"
        />
      </div>
    </ng-template>
  </p-orderlist>

  <!-- Footer del dialog -->
  <div class="flex justify-end gap-2 pt-2 border-t border-slate-100">
    <p-button label="Cancelar" severity="secondary" (onClick)="onCancel()" />
    <p-button
      label="Guardar orden"
      icon="pi pi-save"
      severity="success"
      [loading]="store.isSaving()"
      [disabled]="!hasChanges()"
      (onClick)="saveOrder()"
    />
  </div>
</div>
