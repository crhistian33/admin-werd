<p-dialog
  [(visible)]="visible"
  header="Revisar Reclamación"
  [modal]="true"
  [style]="{ width: '500px' }"
  [closable]="!loading()"
  (onHide)="onCancel()"
>
  @if (claim(); as c) {
    <div class="flex flex-col gap-5">
      <!-- Info Header -->
      <div class="bg-surface-50 p-4 rounded-lg flex flex-col gap-2">
        <div class="flex justify-between items-center">
          <span class="font-mono text-sm font-semibold">{{
            c.claimNumber
          }}</span>
          <p-tag [value]="CLAIM_TYPE_LABELS[c.type]" severity="info" />
        </div>
        <div class="text-sm text-surface-600">
          {{ c.description || "Sin descripción" }}
        </div>
      </div>

      <!-- Acción -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium"
          >Acción <span class="text-red-500">*</span></label
        >
        <p-select
          [options]="actionOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="Seleccionar acción..."
          [ngModel]="action()"
          (ngModelChange)="action.set($event)"
          class="w-full"
        />
      </div>

      <!-- Nota de revisión -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium">
          Nota para el cliente
          @if (action() === "REJECTED") {
            <span class="text-red-500">*</span>
          }
        </label>
        <textarea
          pTextarea
          rows="3"
          placeholder="Motivo visible para el cliente..."
          [ngModel]="reviewNote()"
          (ngModelChange)="reviewNote.set($event)"
          class="w-full"
        ></textarea>
      </div>

      <!-- Nota interna -->
      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium">Nota interna (Admin)</label>
        <textarea
          pTextarea
          rows="2"
          placeholder="Notas para el equipo..."
          [ngModel]="internalNote()"
          (ngModelChange)="internalNote.set($event)"
          class="w-full"
        ></textarea>
      </div>
    </div>
  }

  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      severity="secondary"
      [text]="true"
      [disabled]="loading()"
      (click)="onCancel()"
    />
    <p-button
      label="Confirmar"
      [loading]="loading()"
      [disabled]="!isValid()"
      (click)="onConfirm()"
    />
  </ng-template>
</p-dialog>
