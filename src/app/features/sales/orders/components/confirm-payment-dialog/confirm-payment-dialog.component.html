<p-dialog
  [(visible)]="visible"
  header="Confirmar Pago"
  [modal]="true"
  [style]="{ width: '550px' }"
  [closable]="!loading()"
  (onHide)="onCancel()"
>
  @if (order(); as o) {
    <div class="bg-surface-50 p-4 rounded-lg flex flex-col gap-2 mb-4">
      <div class="flex justify-between items-center">
        <span class="font-mono text-sm font-semibold">{{ o.orderNumber }}</span>
        <p-tag
          [value]="getStatusLabel(o.status)"
          [severity]="getStatusSeverity(o.status)"
        />
      </div>
      <div class="text-sm text-surface-600">
        <p>Cliente: {{ getCustomerName(o) }}</p>
        <p class="font-medium">Método de pago: {{ o.paymentMethod?.name }}</p>
      </div>
      <div class="text-right mt-2">
        <span class="text-sm text-surface-500">Total a pagar:</span>
        <span class="text-xl font-bold text-primary ml-2">
          {{ o.total | currency: "S/ " : "symbol" : "1.2-2" }}
        </span>
      </div>
    </div>
  }

  <app-form-dynamic
    [steps]="formConfig()"
    [loading]="loading()"
    [submitLabel]="'Confirmar pago'"
    [size]="'compact'"
    (submitted)="onFormSubmit($event)"
    (cancelled)="onCancel()"
  />
</p-dialog>
