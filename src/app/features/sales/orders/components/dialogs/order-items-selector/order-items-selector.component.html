<div class="field">
  <p-table [value]="itemsWithAvailability()">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 3rem"></th>
        <th>Producto</th>
        <th style="width: 9rem">Cantidad Disp.</th>
        <th style="width: 10rem">Cant. a Procesar</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr [class.bg-slate-50]="!isSelected(item.id)">
        <td>
          <p-checkbox
            [binary]="true"
            [disabled]="item.availableQuantity === 0 || loading()"
            [ngModel]="isSelected(item.id)"
            (onChange)="toggleSelection(item)"
          />
        </td>
        <td>
          <div class="flex items-center gap-3">
            @if (item.productImageUrl) {
              <img
                [src]="getProductImageUrl(item.productImageUrl)"
                [alt]="item.productName"
                class="w-10 h-10 rounded shadow-sm object-cover"
              />
            } @else {
              <div
                class="w-10 h-10 rounded shadow-sm flex items-center justify-center"
              >
                <i class="pi pi-image"></i>
              </div>
            }
            <div class="flex flex-col">
              <span class="font-medium text-sm">{{ item.productName }}</span>
              <span class="text-xs text-slate-400 font-mono">{{
                item.productSku
              }}</span>
            </div>
          </div>
        </td>
        <td class="text-center font-semibold">
          {{ item.availableQuantity }} / {{ item.quantity }}
        </td>
        <td class="text-right">
          @if (isSelected(item.id)) {
            <p-inputNumber
              [ngModel]="getSelectedQuantity(item.id)"
              (onInput)="updateQuantity(item.id, $event.value!)"
              [min]="1"
              [max]="item.availableQuantity"
              [showButtons]="true"
              size="small"
              [inputStyle]="{ width: '6rem' }"
              [disabled]="loading()"
            />
          } @else {
            <span class="text-slate-300 italic text-sm">No seleccionado</span>
          }
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center py-4 text-slate-400">
          No hay productos disponibles en este pedido.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
