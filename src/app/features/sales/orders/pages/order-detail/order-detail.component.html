@if (isLoading()) {
  <div class="flex flex-col gap-4 p-4">
    <p-skeleton height="2rem" width="20rem" />
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <p-skeleton height="8rem" />
      <p-skeleton height="8rem" />
      <p-skeleton height="8rem" />
    </div>
    <p-skeleton height="12rem" />
  </div>
} @else if (order(); as o) {
  <div class="flex flex-col gap-6 p-4 md:p-6 lg:p-8 max-w-7xl mx-auto w-full">
    <!-- HEADER -->
    <app-order-detail-header
      [order]="o"
      [actions]="availableActions()"
      [statusLabel]="store.statusLabel()"
      [statusSeverity]="store.statusSeverity()"
      [parentOrder]="store.parentOrderNumber()"
      (back)="goBack()"
    />

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <!-- COLUMNA IZQUIERDA (2/3) -->
      <div class="lg:col-span-2 flex flex-col gap-8">
        <!-- Items (ahora solo necesita getProductImageUrl) -->
        <app-order-items-table
          [getProductImageUrl]="getProductImageUrl"
          (scrollToClaims)="scrollToClaimsSection()"
        />

        <!-- Timeline -->
        @if (o.statusHistory?.length) {
          <app-order-timeline
            [events]="o.statusHistory!"
            [order]="o"
            [getProductImageUrl]="getProductImageUrl"
            (showDetail)="openActionDetail($event)"
          />
        }

        <!-- Transacciones -->
        @if (o.transactions?.length) {
          <app-order-transactions [transactions]="o.transactions!" />
        }

        <!-- Claims -->
        @if (store.hasActiveClaims()) {
          <div id="claims-section">
            <app-order-claims
              [claims]="store.currentClaims()"
              [getProductImageUrl]="getProductImageUrl"
              (claimAction)="handleClaimAction($event)"
            />
          </div>
        }
      </div>

      <!-- COLUMNA DERECHA - SIDEBAR (1/3) -->
      <div class="flex flex-col gap-8">
        <app-order-sidebar
          [order]="o"
          [logistics]="store.currentLogistics()"
          (navigateToCustomer)="goToCustomerProfile($event)"
        />

        <app-order-profitability
          [netProfit]="store.netProfit()"
          [profitMargin]="store.profitMargin()"
        />
      </div>
    </div>
  </div>

  <!-- DIÁLOGOS -->
  <app-order-actions-dialog
    [(visible)]="actionDialogVisible"
    [config]="currentActionConfig()"
    [claims]="store.currentClaims()"
    [loading]="isActionLoading()"
    (action)="onActionSubmit($event)"
    (close)="closeActionDialog()"
  />

  <app-order-action-detail-dialog
    [(visible)]="actionDetailVisible"
    [header]="actionDetailHeader()"
    [order]="o"
    [event]="selectedEventForDetail()"
    (close)="closeActionDetail()"
  />
} @else {
  <div class="flex flex-col justify-center items-center h-96 text-slate-300">
    <i class="pi pi-search text-6xl mb-4"></i>
    <span class="text-lg font-semibold">Pedido no encontrado</span>
    <p-button
      label="Volver al listado"
      icon="pi pi-arrow-left"
      [text]="true"
      (click)="goBack()"
      styleClass="mt-4"
    />
  </div>
}
