<h2 class="text-xl md:text-2xl font-semibold text-green-600 mb-4">
  LISTADO DE PEDIDOS
</h2>
<div>
  <app-data-table
    [data]="store.filteredItems()"
    [config]="tableConfig"
    [loading]="store.loading()"
    (searchChange)="store.setFilter({ search: $event })"
    (filterDrawer)="drawerVisible.set(true)"
  >
    <ng-container tableDrawer>
      <app-order-filter [(visible)]="drawerVisible" />
    </ng-container>
  </app-data-table>
</div>
