<div class="flex flex-col gap-4">
  <p class="text-sm text-slate-500">
    Arrastra los slides para cambiar el orden de aparición.
  </p>

  <p-orderlist
    [value]="items()"
    (onReorder)="onReorder($event)"
    [(selection)]="selectedItems"
    [dragdrop]="true"
    dataKey="id"
    filterBy="title"
    [listStyle]="{ 'max-height': '400px' }"
  >
    <ng-template #item let-slide>
      <div class="flex items-center gap-3 py-1 px-1 w-full">
        @if (slide.images?.[0]?.variants?.thumb) {
          <img
            [src]="buildImageUrl(slide.images[0].variants.thumb)"
            class="w-10 h-10 object-cover rounded-lg shrink-0"
            [alt]="slide.title"
          />
        } @else {
          <div
            class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center shrink-0"
          >
            <lucide-icon name="image" class="w-4 h-4 text-slate-400" />
          </div>
        }

        <span class="text-sm font-medium text-slate-800 truncate flex-1">
          {{ slide.title ?? "Sin título" }}
        </span>

        <p-tag
          [value]="slide.isActive ? 'Activo' : 'Inactivo'"
          [severity]="slide.isActive ? 'success' : 'danger'"
          class="shrink-0"
        />
      </div>
    </ng-template>
  </p-orderlist>

  <!-- Footer del dialog -->
  <div class="flex justify-end gap-2 pt-2 border-t border-slate-100">
    <p-button label="Cancelar" severity="secondary" (onClick)="onCancel()" />
    <p-button
      label="Guardar orden"
      icon="pi pi-save"
      severity="success"
      [loading]="store.isSaving()"
      [disabled]="!hasChanges()"
      (onClick)="saveOrder()"
    />
  </div>
</div>
