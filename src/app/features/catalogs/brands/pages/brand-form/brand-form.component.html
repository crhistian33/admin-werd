<app-form-dynamic
  [fields]="fields"
  [initialData]="initialData()"
  [loading]="store.isSaving()"
  [fetching]="isEdit() && store.loadingState().initial"
  [title]="isEdit() ? (store.selected()?.name ?? '...') : 'Crear marca'"
  size="compact"
  [submitLabel]="isEdit() ? 'Actualizar' : 'Crear'"
  (submitted)="onSubmit($event)"
  (cancelled)="goBack()"
/>
