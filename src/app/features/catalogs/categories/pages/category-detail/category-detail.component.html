<div>
  @if (store.loading()) {
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <div class="lg:col-span-6 space-y-6">
        <p-card>
          <div class="grid grid-cols-1 gap-4">
            <div class="space-y-2">
              <p-skeleton width="100%" height="2rem" />
              <p-skeleton width="100%" height="2rem" />
            </div>
            <div class="grid grid-cols-2 gap-4 mt-2">
              <div class="space-y-2">
                <p-skeleton width="100%" height="2rem" />
                <p-skeleton width="100%" height="2rem" />
              </div>
              <div class="space-y-2">
                <p-skeleton width="100%" height="2rem" />
                <p-skeleton width="100%" height="2rem" />
              </div>
            </div>
          </div>
        </p-card>
      </div>

      <div class="lg:col-span-6">
        <p-card>
          <p-skeleton width="100%" height="10rem" />
        </p-card>
      </div>
    </div>
  }

  @if (!store.loading() && store.selected()) {
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <p-button
          icon="pi pi-arrow-left"
          label="Volver"
          [text]="true"
          severity="secondary"
          (onClick)="goBack()"
        />
        <h2 class="text-2xl font-semibold uppercase">
          {{ store.selected()?.name }}
        </h2>
        <p-tag value="Activo" severity="success" class="shrink-0" />
      </div>
      <div class="flex gap-3 flex-wrap">
        <p-button
          severity="warn"
          icon="pi pi-pencil"
          label="Editar"
          size="small"
          (onClick)="edit()"
        />
        <p-button
          icon="pi pi-trash"
          label="Eliminar"
          size="small"
          severity="danger"
          [outlined]="true"
          (onClick)="onDelete()"
        />
      </div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      <div class="lg:col-span-6 space-y-6">
        <p-card header="Información General">
          <div class="grid grid-cols-1 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Descripción</label>
              <p
                class="text-slate-500 bg-slate-50 p-4 rounded-lg border border-slate-200"
              >
                {{ store.selected()?.description }}
              </p>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-2">
              <div>
                <label class="block text-sm font-medium mb-1"
                  >Total de productos</label
                >
                <p
                  class="text-slate-500 bg-slate-50 p-4 rounded-lg border border-slate-200"
                >
                  124
                </p>
              </div>
              <div>
                <label class="block text-sm font-medium mb-1"
                  >Última actualización</label
                >
                <p
                  class="text-slate-500 bg-slate-50 p-4 rounded-lg border border-slate-200"
                >
                  10 Mar, 2026
                </p>
              </div>
            </div>
          </div>
        </p-card>
      </div>

      <div class="lg:col-span-6">
        <p-card header="Imagen de la categoría">
          <div
            class="relative group overflow-hidden rounded-xl flex items-center justify-center"
          >
            <img
              [src]="store.selected()?.image"
              alt="Calzados"
              class="w-full h-auto object-cover transition-transform duration-500 group-hover:scale-105"
            />
            <div
              class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2"
            >
              <p-button
                icon="pi pi-search"
                [rounded]="true"
                severity="secondary"
              />
            </div>
          </div>
          <p class="text-[10px] text-center text-surface-400 mt-2 italic">
            Formatos permitidos: JPG, PNG. Máx 2MB.
          </p>
        </p-card>
      </div>
    </div>
  }
  @if (!store.loading() && !store.selected()) {
    <div
      class="max-w-3xl mx-auto text-center py-20 flex flex-col items-center gap-4"
    >
      <lucide-icon name="folder-tree" class="w-12 h-12 text-slate-300" />
      <p class="text-slate-500 text-lg">Categoría no encontrada</p>
      <p-button label="Volver al listado" [text]="true" (onClick)="goBack()" />
    </div>
  }
</div>
