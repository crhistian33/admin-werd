<header
  class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-3 md:px-6 shrink-0"
>
  <div class="flex items-center gap-4">
    <button
      (click)="nav.isMobileVisible.set(true)"
      class="md:hidden p-2 text-slate-600"
    >
      <lucide-icon name="menu" class="size-6"></lucide-icon>
    </button>
    <h1 class="text-xl font-semibold uppercase">{{ pageTitle.title() }}</h1>
  </div>
  <div class="flex items-center gap-2">
    <span>Juan Perez</span>
    <lucide-icon
      name="circle-user-icon"
      class="w-6 h-6 text-slate-500"
    ></lucide-icon>
    <lucide-icon name="ellipsis-vertical" class="h-6"></lucide-icon>
  </div>
</header>
