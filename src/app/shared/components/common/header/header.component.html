<header
  class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-3 md:px-6 shrink-0"
>
  <div class="flex items-center gap-4">
    <button
      (click)="nav.isMobileVisible.set(true)"
      class="md:hidden p-2 text-slate-600"
    >
      <lucide-icon name="menu" class="size-6"></lucide-icon>
    </button>
    <!-- <h1 class="text-xl font-semibold uppercase">{{ pageTitle.title() }}</h1> -->
  </div>
  <div class="flex items-center gap-2">
    <span>{{ user()?.name }}</span>
    <p-avatar
      shape="circle"
      size="large"
      [label]="user()?.name?.charAt(0)"
      (click)="menu.toggle($event)"
      styleClass="cursor-pointer"
      [style]="{ 'background-color': '#075985', color: '#ffffff' }"
      size="normal"
    />
    <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body">
      <ng-template pTemplate="start">
        <div class="p-3 sm:hidden border-b border-slate-100">
          <p class="font-bold text-sm">{{ user()?.name }}</p>
        </div>
      </ng-template>
    </p-menu>
  </div>
</header>
