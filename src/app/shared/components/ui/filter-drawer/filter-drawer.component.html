<p-drawer
  [(visible)]="visible"
  position="right"
  header="Filtros"
  [pt]="{
    title: { class: '!text-lg !font-semibold' },
    header: { class: '!py-1 !px-4 !border-b !border-slate-200' },
    footer: { class: '!py-3 !px-4 !border-t !border-slate-200' },
  }"
>
  <div class="flex flex-col gap-6 p-4">
    <ng-content />
  </div>

  <ng-template #footer>
    <div class="flex flex-col md:flex-row gap-3 w-full">
      <p-button
        label="Ver resultados"
        styleClass="w-full"
        class="w-full md:flex-1"
        (onClick)="visible.set(false)"
      />
      <p-button
        label="Limpiar"
        severity="secondary"
        [outlined]="true"
        styleClass="w-full"
        class="w-full md:flex-1"
        (onClick)="onClear()()"
      />
    </div>
  </ng-template>
</p-drawer>
