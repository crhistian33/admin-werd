<div class="flex flex-col gap-4">
  <p class="text-sm text-slate-500">
    Arrastra los elementos para cambiar el orden de aparición.
  </p>

  @if (reorderService.config(); as config) {
    <p-orderlist
      [value]="items()"
      (onReorder)="onReorder($event)"
      [(selection)]="selectedItems"
      [dragdrop]="true"
      dataKey="id"
      [listStyle]="{ 'max-height': '450px' }"
    >
      <ng-template #item let-item>
        <div class="flex items-center gap-3 py-2 px-1 w-full">
          @if (config.imageField && getValue(item, config.imageField)) {
            <img
              [src]="buildImageUrl(getValue(item, config.imageField))"
              class="w-12 h-8 object-cover rounded shadow-sm shrink-0"
              alt="Preview"
            />
          }
          <div class="flex-1 min-w-0">
            <span class="text-sm font-medium text-slate-800 truncate block">
              {{ getValue(item, config.labelField) }}
            </span>
          </div>

          @if (item.isActive !== undefined) {
            <p-tag
              [value]="item.isActive ? 'Activo' : 'Inactivo'"
              [severity]="item.isActive ? 'success' : 'danger'"
              class="shrink-0"
            />
          }
        </div>
      </ng-template>
    </p-orderlist>

    <div class="flex justify-end gap-2 pt-4 border-t border-slate-100">
      <p-button label="Cancelar" severity="secondary" (onClick)="onCancel()" />
      <p-button
        label="Guardar orden"
        icon="pi pi-save"
        severity="success"
        [loading]="reorderService.isSaving()"
        [disabled]="!hasChanges()"
        (onClick)="saveOrder()"
      />
    </div>
  }
</div>
