@if (isLoading()) {
  <div class="absolute top-0 left-0 z-50 w-full">
    <p-progressbar mode="indeterminate" [style]="{ height: '6px' }" />
  </div>
}
<div class="flex h-screen bg-slate-50 font-sans overflow-hidden">
  <aside class="hidden md:block h-full shrink-0">
    <app-nav></app-nav>
  </aside>

  <div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden">
    <app-header />
    <div
      class="flex justify-between items-center border-b border-slate-200 px-3 py-2 mb-4 md:px-6"
    >
      <h1 class="text-2xl font-semibold text-green-700 uppercase">
        {{ pageTitle.title() }}
      </h1>
      <app-breadcrumb />
    </div>
    <main
      #mainContent
      class="flex-1 overflow-auto bg-slate-50 px-3 pb-4 md:px-6"
    >
      <router-outlet></router-outlet>
    </main>
  </div>

  <p-drawer
    [(visible)]="isMobileVisible"
    [showCloseIcon]="false"
    position="left"
    styleClass="!w-full !p-0 !border-none"
  >
    <app-nav class="h-full"></app-nav>
  </p-drawer>
</div>
<p-confirmdialog>
  <ng-template #message let-message>
    @if (message) {
      <div
        class="flex flex-col items-center w-full gap-4 border-b border-slate-200 pb-4"
      >
        <div class="pt-2">
          <i
            class="text-6xl!"
            [ngClass]="[
              message.icon,
              message.icon?.includes('delete') ? 'text-red-500' : '',
              message.icon?.includes('exclamation') ? 'text-orange-500' : '',
              message.icon?.includes('info') ? 'text-blue-500' : '',
            ]"
          ></i>
        </div>
        <p
          class="text-center text-surface-600"
          [innerHTML]="message.message"
        ></p>
      </div>
    }
  </ng-template>
</p-confirmdialog>

<p-dialog
  [header]="reorderService.config()?.title || ''"
  [visible]="reorderService.isVisible()"
  (visibleChange)="reorderService.isVisible.set($event)"
  [modal]="true"
  [style]="{ width: reorderService.config()?.width || '480px' }"
  [draggable]="false"
  [dismissableMask]="true"
>
  @if (reorderService.isVisible()) {
    <app-reorder-dynamic />
  }
</p-dialog>
